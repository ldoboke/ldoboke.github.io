<script>
(function(){
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.addEventListener('keydown', function(e){
    const k = (e.key || '').toLowerCase();
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(k)) ||
      (e.ctrlKey && ['u','s'].includes(k))
    ){
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>

<script data-goatcounter="https://ldoboke.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>




<script>
(function(){
  function setText(id, value){
    var el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  function normalizedPath(){
    var path = location.pathname || "/";
    if (path.endsWith("index.html")) path = path.slice(0, -"index.html".length);
    if (!path.endsWith("/")) path += "/";
    return path || "/";
  }

  function counterUrl(path){
    return "https://ldoboke.goatcounter.com/counter/" + encodeURIComponent(path) + ".json";
  }

  async function fetchCount(path){
    try{
      var res = await fetch(counterUrl(path), {
        mode: "cors",
        cache: "no-store"
      });

      if (!res.ok) throw new Error("bad response");

      var data = await res.json();

      if (typeof data.count === "string") return data.count;
      if (typeof data.count === "number") return String(data.count);

      return "0";
    }catch(e){
      return "—";
    }
  }

  async function applyGoatCounterStats(){
    var path = normalizedPath();

    var total = await fetchCount("TOTAL");
    setText("gc-total", total);

    var current = await fetchCount(path);
    setText("gc-path", current);
    setText("gc-article", current);

    setText("gc-today", "后台查看");
  }

  window.addEventListener("DOMContentLoaded", applyGoatCounterStats);
})();
</script>
