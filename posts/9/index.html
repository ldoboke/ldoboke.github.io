    setText("gc-total", total);

    setText("gc-path", current);
    setText("gc-article", current);

    setText("gc-today", "后台查看");
  }

  window.addEventListener("DOMContentLoaded", applyGoatCounterStats);
})();
</script>













<script src="https://cdn.jsdelivr.net/npm/twikoo@1.7.7/dist/twikoo.min.js"></script>
<script>
(function () {
  function normalizedPath() {
    var path = location.pathname || '/';
    if (path.endsWith('index.html')) path = path.slice(0, -'index.html'.length);
    if (!path.endsWith('/')) path += '/';
    return path || '/';
  }

  function initTwikoo() {
    if (!window.twikoo) return;
    twikoo.init({
      envId: 'https://twikoo-ldoboke.vercel.app',
      el: '#tcomment',
      path: normalizedPath(),
      lang: 'zh-CN'
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initTwikoo);
  } else {
    initTwikoo();
  }
})();
</script>

<script>
(function () {
  try {
    document.oncontextmenu = null;
    window.oncontextmenu = null;
    document.onkeydown = null;
    window.onkeydown = null;
  } catch (e) {}

  function unblock(evt) {
    evt.stopImmediatePropagation();
  }

  window.addEventListener('contextmenu', unblock, true);
  document.addEventListener('contextmenu', unblock, true);
  window.addEventListener('keydown', unblock, true);
  document.addEventListener('keydown', unblock, true);

  window.addEventListener('load', function () {
    try {
      document.oncontextmenu = null;
      window.oncontextmenu = null;
      document.onkeydown = null;
      window.onkeydown = null;
    } catch (e) {}
  });
})();
</script>
