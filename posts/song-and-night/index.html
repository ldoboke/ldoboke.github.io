<script>
(function(){
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.addEventListener('keydown', function(e){
    const k = (e.key || '').toLowerCase();
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(k)) ||
      (e.ctrlKey && ['u','s'].includes(k))
    ){
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
